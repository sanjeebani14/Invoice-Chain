  # Caching & Messaging Service 
  redis:
    image: redis:7-alpine
    container_name: invoice_redis
    restart: always
    ports:
      - "6379:6379"

  # MinIO Service 
  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: invoicechain
      MINIO_ROOT_PASSWORD: invoicechain123
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
volumes:
  postgres_data: