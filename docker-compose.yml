services:
  # Database Service [cite: 10, 92]
  db:
    image: postgres:15-alpine
    container_name: invoice_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Caching & Messaging Service [cite: 10, 90]
  redis:
    image: redis:7-alpine
    container_name: invoice_redis
    restart: always
    ports:
      - "6379:6379"

  # MinIO Service [cite: 10, 90]
  minio:
    image: quay.io/minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: invoicechain
      MINIO_ROOT_PASSWORD: invoicechain123
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
volumes:
  postgres_data: